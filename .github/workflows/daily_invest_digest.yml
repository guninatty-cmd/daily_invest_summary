name: Daily Investment Digest

on:
  schedule:
    # UTC 22:00 = KST 07:00 (백업용 - cron-job.org가 주 트리거)
    - cron: '0 22 * * 0-4'
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Trigger source (cron-job.org or manual)'
        required: false
        default: 'manual'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data/processed_pdf_hashes.txt 커밋용

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install yt-dlp binary
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Run pipeline
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GOOGLE_DRIVE_PARENT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_PARENT_FOLDER_ID }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python main.py

      - name: Commit updated PDF hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_pdf_hashes.txt
          git diff --cached --quiet || git commit -m "chore: update processed PDF hashes [skip ci]"
          git push
