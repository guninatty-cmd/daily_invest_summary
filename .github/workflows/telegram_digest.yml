name: Daily Telegram Stock Digest

on:
  schedule:
    - cron: '0 9 * * *' # 매일 한국 시간 오후 6시 정각에 자동 실행 (UTC 09:00)
  workflow_dispatch: # 수동으로 테스트 실행할 수 있는 버튼

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러 설치
      run: |
        python -m pip install --upgrade pip
        pip install telethon pandas openpyxl google-api-python-client google-auth-httplib2 google-auth-oauthlib google-auth

    - name: 데이터 수집 및 구글 드라이브 전송 스크립트 실행
      env:
        TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
        GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        GOOGLE_DRIVE_PARENT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_PARENT_FOLDER_ID }}
      run: |
        python main.py
